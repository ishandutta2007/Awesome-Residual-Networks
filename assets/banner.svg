<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Text Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Moving gradient for shortcut lines -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    .bg { fill: url(#bgGrad); }
    .title {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 42px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      fill: #94a3b8;
      font-size: 16px;
      letter-spacing: 4px;
    }
    .pulse-glow {
      transform-origin: center;
      animation: pulse 4s ease-in-out infinite;
    }
    .flow-line {
      stroke: url(#lineGrad);
      stroke-width: 3;
      stroke-dasharray: 8 4;
      animation: dash 2s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="250" class="bg" rx="12" />

  <!-- Animated background glows -->
  <circle cx="200" cy="125" r="100" fill="#6366f1" opacity="0.1" class="pulse-glow" filter="blur(40px)" />
  <circle cx="600" cy="125" r="120" fill="#ec4899" opacity="0.1" class="pulse-glow" filter="blur(50px)" />

  <!-- Network nodes and skip connections graphics -->
  <g transform="translate(40, 20)">
    <!-- Nodes -->
    <circle cx="80" cy="100" r="10" fill="#475569" />
    <circle cx="200" cy="100" r="12" fill="#6366f1" />
    <circle cx="320" cy="100" r="12" fill="#6366f1" />
    <circle cx="440" cy="100" r="10" fill="#475569" />
    
    <!-- Standard path -->
    <line x1="90" y1="100" x2="188" y2="100" stroke="#475569" stroke-width="2" />
    <line x1="212" y1="100" x2="308" y2="100" stroke="#475569" stroke-width="2" />
    <line x1="332" y1="100" x2="430" y2="100" stroke="#475569" stroke-width="2" />
    
    <!-- Shortcut paths (skip connections) -->
    <path d="M 80 90 Q 200 20 320 90" fill="none" class="flow-line" />
    <path d="M 200 90 Q 320 20 440 90" fill="none" class="flow-line" />
  </g>

  <!-- Typography -->
  <text x="400" y="125" text-anchor="middle" class="title" filter="url(#glow)">Awesome ResNets</text>
  <text x="400" y="165" text-anchor="middle" class="subtitle">DEEP RESIDUAL NETWORKS EVOLUTION &amp; VARIANTS</text>
</svg>
